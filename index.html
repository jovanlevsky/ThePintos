<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuneUp Home</title>
    <link rel="stylesheet" href="style.css">

    
        <script>
        const loggedInUser = localStorage.getItem('loggedInUser');

        if (!loggedInUser) {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>
    <header>
        <div class="logo">TuneUp</div>
        <nav>
            <ul class="nav-links">
                <li class="other-btn"><a href="index.html" class="active">Dashboard</a></li>
                <li class="other-btn"><a href="garage.html">My Garage</a></li>
                <li class="other-btn"><a href="log.html">Log Service</a></li>
                <li class="other-btn"><a href="reminders.html">Reminders</a></li>
                <li id="auth-btn"><a href="login.html">Login</a></li>
                <li class="other-btn"><a href="about.html">About team</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Welcome Back!</h1>
        <section class="dashboard-grid">
            <div class="card alert">
                <h3>Needs Attention</h3>
                <p><strong>2018 Honda Civic:</strong> Oil change due in 200 miles.</p>
                <a href="log.html" class="btn">Log Now</a>
            </div>

            <div class="card">
                <h3>Recent Activity</h3>
                <p>Tire Rotation logged on March 28, 2026.</p>
            </div>
            
            <div class="card">
                <h3>My Garage</h3>
                <p>2 Vehicles Registered</p>
                <a href="garage.html" class="btn">View Garage</a>
            </div>
        </section>

    </main>
    <script>
        const user = localStorage.getItem('loggedInUser');

        if (user) {
            const welcome = document.getElementById('welcomeUser');
            if (welcome) {
                welcome.textContent = "Welcome Back, " + user + "!";
            }
        }
    </script>
</body>
</html>
