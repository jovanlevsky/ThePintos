<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuneUp - My Garage</title>
    <link rel="stylesheet" href="style.css">

    <script>
        const loggedInUser = localStorage.getItem('loggedInUser');

        if (!loggedInUser) {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <header>
        <div class="logo">TuneUp</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="garage.html" class="active">My Garage</a></li>
                <li><a href="log.html">Log Service</a></li>
                <li class="other-btn"><a href="profile.html">Profile</a></li>
                <li class="other-btn"><a href="reminders.html">Reminders</a></li>
                <li><a href="login.html" id="login-nav">Login</a></li>
                <li><a href="about.html">About team</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="garage-header">
            <h1>My Garage</h1>
            <button id="add-vehicle-btn" class="btn">+ Add New Vehicle</button>
        </div>

        <section class="vehicle-grid" id="vehicle-grid">
            <!--should be populated by the script-->
        </section>
    </main>

    <!-- add/edit modal -->
    <div id="vehicle-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 id="modal-title">Add New Vehicle</h2>
            <form id="vehicle-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="v-year">Year <span class="req">*</span></label>
                        <input type="number" id="v-year" placeholder="e.g. 2021" min="1900" max="2100" required>
                    </div>
                    <div class="form-group">
                        <label for="v-make">Make <span class="req">*</span></label>
                        <input type="text" id="v-make" placeholder="e.g. Honda" required>
                    </div>
                    <div class="form-group">
                        <label for="v-model">Model <span class="req">*</span></label>
                        <input type="text" id="v-model" placeholder="e.g. Civic" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="v-vin">VIN</label>
                        <input type="text" id="v-vin" placeholder="17-character VIN" maxlength="17">
                    </div>
                    <div class="form-group">
                        <label for="v-plate">License Plate</label>
                        <input type="text" id="v-plate" placeholder="e.g. ABC-1234">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="v-mileage">Current Mileage <span class="req">*</span></label>
                        <input type="number" id="v-mileage" placeholder="e.g. 45000" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="v-fuel">Fuel Type</label>
                        <select id="v-fuel">
                            <option value="">Select...</option>
                            <option value="Gasoline">Gasoline</option>
                            <option value="Diesel">Diesel</option>
                            <option value="Electric">Electric</option>
                            <option value="Hybrid">Hybrid</option>
                            <option value="Plug-in Hybrid">Plug-in Hybrid</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="v-oil-type">Oil Type</label>
                        <input type="text" id="v-oil-type" placeholder="e.g. 0W-20">
                    </div>
                    <div class="form-group">
                        <label for="v-oil-interval">Oil Change Interval (miles)</label>
                        <input type="number" id="v-oil-interval" placeholder="e.g. 5000" min="1000">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn">Save Vehicle</button>
                    <button type="button" id="modal-cancel" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        const user = localStorage.getItem('loggedInUser');
        const loginNav = document.getElementById('login-nav');

        if (user && loginNav) {
            loginNav.textContent = "Logout";
            loginNav.href = "#";
            loginNav.onclick = function(event) {
                event.preventDefault();
                localStorage.removeItem('loggedInUser');
                window.location.href = 'login.html';
            };
        }
    </script>
</body>
</html>
